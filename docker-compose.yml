services:
  mysql:
    # Stack local de apoio ao backend local.
    # Nao representa a API dev hospedada na VPS.
    image: mysql:8.0
    container_name: viraazul-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: virazul_dev_local
      TZ: America/Sao_Paulo
    ports:
      - "3308:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    # Opcional para desenvolvimento local de backend.
    # O modo padrao de frontend local continua sendo usar a API dev da VPS.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virazul-api-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env

volumes:
  mysql_dev_data:
