version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: viraazul-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: viraazul
      TZ: America/Sao_Paulo
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virazul-api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: viraazul
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: troque-este-segredo
      JWT_EXPIRES_IN: 1h
      TZ: America/Sao_Paulo
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mysql_data:
